<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="favicon.png">

    <title>BOM Vault</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link rel="stylesheet" href="bom_vault.css">
</head>

<body>
    <!-- Modal Structure -->
    <div class="modal fade" id="notesModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Notes</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- e.notes HTML content will be injected here -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container-fluid mt-2">
        <!-- Category & Temperature Filter Area -->
        <div class="category-section text-center">
            <div class="d-inline-flex flex-nowrap align-items-center">
                <span id="categories">
                </span>
            </div>
        </div>

        <!-- Search Area -->
        <div class="row justify-content-center mb-4">
            <div class="col-md-6">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0">
                        <i class="bi bi-search"></i>
                    </span>
                    <input type="text" id="searchInput" class="form-control border-start-0" placeholder="Search ...">
                </div>
            </div>
        </div>

        <!-- Full Width Table -->
        <div class="table-container mb-4">
            <div class="table-responsive">
                <table class="table table-hover w-100" id="datatable">
                    <thead class="table-dark">
                        <tr>
                            <th>Device</th>
                            <th>Categories</th>
                            <th>Manufacturer</th>
                            <th>Footprint</th>
                            <th>Value</th>
                            <th>Tolerance</th>
                            <th>Limits</th>
                            <th>Temperature</th>
                            <th>&nbsp;</th>
                        </tr>
                    </thead>
                    <tbody id="datatable_body">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="category-section text-center mb-4" id="footer">

        </div>

    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="output.js"></script>
    <script src="bom_vault.js"></script>
    <script src="bom_vault_categories.js"></script>

</body>

</html>
